<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Study Space</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a32;
      --accent:#7c6aff;--accent2:#4ecdc4;--text:#e8e8f0;--muted:#6b6b7e;
      --danger:#ff6b6b;--success:#4ecdc4;--warn:#ffd166;
    }
    body{
      background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
      height:100vh;overflow:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    /* ===== 常に3カラム固定（Aパターン） ===== */
    .app{
      display:grid;
      grid-template-columns:300px 1fr 340px;
      height:100vh;
      overflow:hidden;
    }

    /* スマホのみ縦積み */
    @media(max-width:700px){
      body{overflow:auto;height:auto;}
      .app{grid-template-columns:1fr;height:auto;overflow:visible;}
      .col-left,.col-mid{border-right:none;border-bottom:1px solid var(--border);}
      .col-right{max-height:none;}
    }

    /* ===== カラム ===== */
    .col-left{
      padding:1.2rem 1rem;
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;gap:.85rem;
      overflow:hidden;
    }
    .col-mid{
      padding:1.2rem 1rem;
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;gap:.85rem;
      overflow:hidden;
    }
    .col-right{
      background:var(--surface);
      display:flex;flex-direction:column;
      overflow:hidden;
    }

    /* ===== 学習時間 ===== */
    .total-label{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.15rem}
    .total-time{font-family:'DM Mono',monospace;font-size:2.4rem;font-weight:400;color:var(--text);line-height:1;letter-spacing:-.02em}
    .total-time span{color:var(--muted);font-size:1.3rem}

    /* ===== タブ ===== */
    .mode-tabs{display:flex;gap:6px}
    .tab{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:11px;cursor:pointer;transition:all .2s}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

    /* ===== タイマーカード ===== */
    .timer-card{
      background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:1rem;display:flex;align-items:center;justify-content:center;gap:1.5rem;
    }
    .timer-info-pane{display:flex;flex-direction:column;align-items:center}
    .timer-phase{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:.4rem}

    /* リング */
    .ring-wrap{position:relative;width:130px;height:130px}
    .ring-wrap svg{transform:rotate(-90deg);width:130px;height:130px}
    .ring-bg{fill:none;stroke:var(--border);stroke-width:5}
    .ring-fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .5s ease,stroke .3s}
    .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:85%}
    .ring-mins{font-family:'DM Mono',monospace;font-size:1.6rem;font-weight:400;line-height:1}
    .ring-label{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

    /* コントロール */
    .controls{display:flex;flex-direction:column;align-items:center;gap:8px}
    .btn-main{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .2s}
    .btn-main:hover{opacity:.85}
    .btn-main:active{transform:scale(.93)}
    .btn-sec{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .btn-sec:hover{border-color:var(--text);color:var(--text)}

    .pomo-dots{display:flex;gap:4px;margin-top:.4rem}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s}
    .dot.done{background:var(--accent)}
    .dot.current{background:var(--warn)}

    .status-bar{display:flex;align-items:center;gap:5px;margin-top:.3rem}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .status-dot.running{background:var(--success);box-shadow:0 0 0 2px rgba(78,205,196,.2)}
    .status-dot.paused{background:var(--warn)}

    /* ===== セクションタイトル ===== */
    .section-title{font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding-bottom:.25rem;border-bottom:1px solid var(--border);margin-bottom:.3rem}

    /* ===== コンテントボックス ===== */
    .content-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.7rem;display:flex;flex-direction:column;overflow:hidden}

    /* ===== ポモドーロ設定 ===== */
    .pomo-settings-dial-wrap{display:flex;gap:8px;justify-content:space-between;align-items:stretch}
    .dial-picker-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;position:relative}
    .dial-label{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
    .dial-select{width:100%;background:transparent;border:none;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;font-weight:500;text-align:center;text-align-last:center;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;padding:3px 0}
    .dial-picker-box::after{content:'▾';font-size:8px;color:var(--muted);position:absolute;bottom:2px;pointer-events:none}
    .counter-box{display:flex;align-items:center;gap:3px;width:100%;justify-content:space-between}
    .counter-btn{width:20px;height:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
    .counter-btn:active{background:var(--border)}
    .counter-value{font-family:'DM Mono',monospace;font-size:13px;color:var(--text)}

    /* ===== タスクリスト ===== */
    .task-container{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
    .task-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;flex:1;padding-right:2px}
    .task-item{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2)}
    .task-checkbox{background:transparent;border:1px solid var(--muted);color:transparent;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;transition:all .2s;flex-shrink:0}
    .task-item.completed .task-checkbox{background:var(--success);border-color:var(--success);color:#fff}
    .task-text{font-size:12px;flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .task-item.completed .task-text{color:var(--muted);text-decoration:line-through}
    .btn-delete{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .btn-delete:hover{color:var(--danger);background:rgba(255,107,107,.1)}

    /* ===== 入力行 ===== */
    .input-row{display:flex;gap:5px;margin-top:.4rem}
    .input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:11px;font-family:'Syne',sans-serif;outline:none}
    .input-row input:focus{border-color:var(--accent)}
    .input-row button{padding:5px 10px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:11px;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}

    /* ===== セッション記録 ===== */
    .log-list{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
    .log-item{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border)}
    .log-item:last-child{border-bottom:none}
    .log-time{font-family:'DM Mono',monospace;color:var(--accent);font-size:10px}

    /* ===== 右カラム YouTube ===== */
    .yt-section{
      display:flex;flex-direction:column;gap:.7rem;
      padding:1rem;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .yt-header{display:flex;align-items:center;justify-content:space-between}
    .yt-wrap{border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:var(--surface2);border:1px solid var(--border)}
    .yt-wrap iframe{width:100%;height:100%;border:none}
    .yt-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;color:var(--muted);font-size:12px}
    .now-playing-bar{background:rgba(124,106,255,.06);border:1px dashed var(--border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:6px;font-size:11px}
    .now-playing-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:var(--text)}

    /* プレイリスト */
    .playlist-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:160px}
    .playlist-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .2s}
    .playlist-item:hover{border-color:var(--accent);background:rgba(124,106,255,.08)}
    .playlist-item.playing{border-color:var(--accent2);background:rgba(78,205,196,.08)}
    .playlist-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .playlist-badge{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(78,205,196,.15);color:var(--accent2);border:1px solid rgba(78,205,196,.3);flex-shrink:0}

    /* PiPボタン */
    .btn-pip{padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-family:'Syne',sans-serif;cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .2s;white-space:nowrap}
    .btn-pip:hover{border-color:var(--accent);color:var(--accent)}
    .btn-pip.active{border-color:var(--accent2);color:var(--accent2);background:rgba(78,205,196,.08)}

    /* 右カラム下部 */
    .right-bottom{display:flex;flex-direction:column;gap:.7rem;padding:1rem;flex:1;overflow:hidden;min-height:0}
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">勉強タイマーアプリ</h2>

<div class="app">

  <!-- ===== 左: タイマー ===== -->
  <div class="col-left">
    <div>
      <div class="total-label">今日の学習時間</div>
      <div class="total-time" id="totalDisplay">00<span>h</span> 00<span>m</span> 00<span>s</span></div>
    </div>

    <div class="mode-tabs">
      <button class="tab active" id="tabPomo" onclick="setMode('pomodoro')">ポモドーロ</button>
      <button class="tab" id="tabFree" onclick="setMode('free')">フリー</button>
    </div>

    <div id="pomoMode" class="timer-card">
      <div class="timer-info-pane">
        <div class="timer-phase" id="pomoPhaseLabel">作業セッション</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 180 180">
            <circle class="ring-bg" cx="90" cy="90" r="80"/>
            <circle class="ring-fg" id="pomoRing" cx="90" cy="90" r="80" stroke-dasharray="502" stroke-dashoffset="0"/>
          </svg>
          <div class="ring-center">
            <div class="ring-mins" id="pomoDisplay">25:00</div>
            <div class="ring-label" id="pomoRingLabel">準備完了</div>
          </div>
        </div>
        <div class="pomo-dots" id="pomoDots"></div>
      </div>
      <div class="controls">
        <button class="btn-main" onclick="togglePomo()"><i class="ti ti-player-play" id="pomoIcon" aria-hidden="true"></i></button>
        <button class="btn-sec" onclick="skipPomo()" title="スキップ"><i class="ti ti-player-skip-forward" aria-hidden="true"></i></button>
        <button class="btn-sec" onclick="resetPomo()" title="リセット"><i class="ti ti-refresh" aria-hidden="true"></i></button>
        <div class="status-bar"><div class="status-dot" id="pomoStatusDot"></div></div>
      </div>
    </div>

    <div id="freeMode" class="timer-card" style="display:none">
      <div class="timer-info-pane">
        <div class="timer-phase">集中タイマー</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 180 180">
            <circle class="ring-bg" cx="90" cy="90" r="80"/>
            <circle class="ring-fg" id="freeRing" cx="90" cy="90" r="80" stroke-dasharray="502" stroke-dashoffset="0"/>
          </svg>
          <div class="ring-center">
            <div class="ring-mins" id="freeDisplay">00:00</div>
            <div class="ring-label" id="freeModeLabel">待機中</div>
          </div>
        </div>
      </div>
      <div class="controls">
        <button class="btn-main" onclick="toggleFree()"><i class="ti ti-player-play" id="freeIcon" aria-hidden="true"></i></button>
        <button class="btn-sec" onclick="lapFree()" title="ラップ"><i class="ti ti-flag" aria-hidden="true"></i></button>
        <button class="btn-sec" onclick="resetFree()" title="リセット"><i class="ti ti-refresh" aria-hidden="true"></i></button>
        <div class="status-bar"><div class="status-dot" id="freeStatusDot"></div></div>
      </div>
    </div>

    <div id="pomoSettingsLeft" class="content-box">
      <div class="section-title" style="border:none;margin-bottom:.3rem">タイマー設定</div>
      <div class="pomo-settings-dial-wrap">
        <div class="dial-picker-box">
          <span class="dial-label">作業</span>
          <select id="workMin" class="dial-select" onchange="updatePomoSettings()"></select>
        </div>
        <div class="dial-picker-box">
          <span class="dial-label">短休憩</span>
          <select id="shortMin" class="dial-select" onchange="updatePomoSettings()"></select>
        </div>
        <div class="dial-picker-box">
          <span class="dial-label">長休憩</span>
          <select id="longMin" class="dial-select" onchange="updatePomoSettings()"></select>
        </div>
        <div class="dial-picker-box" style="flex:1.2">
          <span class="dial-label">セット数</span>
          <div class="counter-box">
            <button class="counter-btn" onclick="adjustSetCount(-1)">−</button>
            <span class="counter-value" id="setCountVal">4</span>
            <button class="counter-btn" onclick="adjustSetCount(1)">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 中央: タスク ===== -->
  <div class="col-mid">
    <div class="total-label" style="padding-bottom:.4rem;border-bottom:1px solid var(--border)">タスク / やることリスト</div>

    <div class="task-container">
      <div class="task-list" id="taskList">
        <div style="font-size:12px;color:var(--muted)">タスクがありません</div>
      </div>
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="新しいタスクを入力..." onkeypress="if(event.key==='Enter')addTask()"/>
        <button onclick="addTask()">追加</button>
      </div>
    </div>

    <div class="content-box" style="flex-shrink:0;max-height:150px">
      <div class="section-title" style="border:none">セッション記録</div>
      <div class="log-list" id="logList">
        <div style="font-size:11px;color:var(--muted)">まだ記録がありません</div>
      </div>
    </div>
  </div>

  <!-- ===== 右: YouTube ===== -->
  <div class="col-right">
    <div class="yt-section">
      <div class="yt-header">
        <div class="section-title" style="border:none;margin:0;padding:0">BGM / 作業音楽</div>
        <button class="btn-pip" id="pipBtn" onclick="togglePiP()" title="ピクチャ・イン・ピクチャ">
          <i class="ti ti-picture-in-picture" aria-hidden="true"></i> PiP
        </button>
      </div>

      <div class="yt-wrap" id="ytWrap">
        <div class="yt-placeholder" id="ytPlaceholder">
          <i class="ti ti-music" style="font-size:26px;color:var(--border)" aria-hidden="true"></i>
          <span>下のリストから動画を選択</span>
        </div>
        <div id="ytPlayerContainer" style="display:none;width:100%;height:100%">
          <div id="ytPlayer"></div>
        </div>
      </div>

      <div class="now-playing-bar">
        <i class="ti ti-disc" style="color:var(--accent);font-size:13px" aria-hidden="true"></i>
        <span class="now-playing-title" id="nowPlayingTitle">動画が再生されていません</span>
      </div>
    </div>

    <div class="right-bottom">
      <div class="section-title">カスタムお気に入り</div>
      <div class="playlist-list" id="customList">
        <div style="font-size:11px;color:var(--muted)">URLを追加してください</div>
      </div>
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="YouTube 動画 / 再生リストのURL"/>
        <button onclick="addCustom()">追加</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ===== State ===== */
let currentPlaying=null;
let customPlaylists=JSON.parse(localStorage.getItem('study_space_custom_playlists'))||[];
let tasks=JSON.parse(localStorage.getItem('study_space_tasks'))||[];
let player=null,titleCheckInterval=null;
let mode='pomodoro';
let freeRunning=false,freeSec=0,freeInterval=null;
let pomoRunning=false,pomoSec=0,pomoInterval=null;
let pomoPhase='work',pomoSet=0;
let workSec=25*60,shortSec=5*60,longSec=15*60,totalSets=4;
let totalStudySec=0,totalInterval=null;
let logs=[];

/* ===== Dial ===== */
function initDialOptions(){
  const w=document.getElementById('workMin'),s=document.getElementById('shortMin'),l=document.getElementById('longMin');
  w.innerHTML=s.innerHTML=l.innerHTML='';
  for(let i=5;i<=60;i+=5){w.options.add(new Option(i+'分',i));l.options.add(new Option(i+'分',i));}
  for(let i=5;i<=30;i+=5){s.options.add(new Option(i+'分',i));}
  w.value=25;s.value=5;l.value=15;
}

/* ===== Tasks ===== */
function renderTasks(){
  const el=document.getElementById('taskList');
  if(!tasks.length){el.innerHTML='<div style="font-size:12px;color:var(--muted)">タスクがありません</div>';return}
  el.innerHTML=tasks.map((t,i)=>`
    <div class="task-item ${t.completed?'completed':''}">
      <div class="task-checkbox" onclick="toggleTask(${i})"><i class="ti ti-check" aria-hidden="true"></i></div>
      <div class="task-text" onclick="toggleTask(${i})">${t.text}</div>
      <button class="btn-delete" onclick="deleteTask(${i})" title="削除"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('');
}
function addTask(){
  const inp=document.getElementById('taskInput'),text=inp.value.trim();
  if(!text)return;
  tasks.push({text,completed:false});
  localStorage.setItem('study_space_tasks',JSON.stringify(tasks));
  inp.value='';renderTasks();
}
function toggleTask(i){tasks[i].completed=!tasks[i].completed;localStorage.setItem('study_space_tasks',JSON.stringify(tasks));renderTasks();}
function deleteTask(i){tasks.splice(i,1);localStorage.setItem('study_space_tasks',JSON.stringify(tasks));renderTasks();}

/* ===== YouTube ===== */
function parseYouTubeUrl(url){
  const listMatch=url.match(/[?&]list=([^&]+)/);
  const vMatch=url.match(/[?&]v=([^&]+)/);
  if(listMatch)return{type:'playlist',id:listMatch[1],videoId:vMatch?vMatch[1]:null};
  if(vMatch)return{type:'video',id:vMatch[1]};
  const short=url.match(/youtu\.be\/([^?&]+)/);
  if(short)return{type:'video',id:short[1]};
  const live=url.match(/youtube\.com\/live\/([^?&]+)/);
  if(live)return{type:'video',id:live[1]};
  return null;
}

function renderCustom(){
  const el=document.getElementById('customList');
  if(!customPlaylists.length){el.innerHTML='<div style="font-size:11px;color:var(--muted)">URLを追加してください</div>';return}
  el.innerHTML=customPlaylists.map((p,i)=>`
    <div class="playlist-item ${currentPlaying===i?'playing':''}" onclick="event.target.closest('.btn-delete')?null:playPlaylist(${i})">
      <div class="playlist-name" id="playlist-name-${i}">${p.name||'カスタムリンク'}</div>
      ${currentPlaying===i?'<span class="playlist-badge">再生中</span>':''}
      <button class="btn-delete" onclick="deleteCustom(${i});event.stopPropagation();" title="削除"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('');
}

function playPlaylist(idx){
  const media=parseYouTubeUrl(customPlaylists[idx].url);
  if(!media){alert('有効なYouTubeのURLを入力してください');return}
  currentPlaying=idx;
  document.getElementById('nowPlayingTitle').textContent='読み込み中...';
  const container=document.getElementById('ytPlayerContainer'),ph=document.getElementById('ytPlaceholder');
  container.style.display='block';ph.style.display='none';
  clearInterval(titleCheckInterval);
  if(player){try{player.destroy()}catch(e){}player=null;}
  container.innerHTML='<div id="ytPlayer"></div>';

  let pv={
    autoplay:1,
    playsinline:1,
    rel:0,           /* 関連動画を同チャンネルに限定 */
    modestbranding:1 /* YouTubeロゴを最小化 */
  };
  let vid=undefined;
  if(media.type==='playlist'){pv.listType='playlist';pv.list=media.id;if(media.videoId)vid=media.videoId;}
  else{vid=media.id;}

  const cfg={width:'100%',height:'100%',playerVars:pv,events:{
    onReady:e=>{e.target.playVideo();startTitleMonitor();ensurePiPAllowed();},
    onStateChange:()=>updateCurrentVideoTitle(),
    onError:e=>{
      const codes={2:'不正なID',5:'HTML5エラー',100:'非公開/削除済み',101:'埋め込み禁止',150:'埋め込み禁止'};
      document.getElementById('nowPlayingTitle').textContent='⚠️ '+(codes[e.data]||`エラー(${e.data})`);
    }
  }};
  if(vid)cfg.videoId=vid;
  player=new YT.Player('ytPlayer',cfg);
  renderCustom();
}

/* ===== タイトル取得（修正版） =====
   動画: youtube.com/oembed → 確実に取れる
   再生リスト: youtube.com/oembed?url=playlist → 先頭動画のタイトルを返すので代替として使用
   noembed.comは不安定なため廃止
*/
async function fetchTitleByUrl(url){
  try{
    const r=await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if(!r.ok)return null;
    const d=await r.json();
    return d.title||null;
  }catch{return null;}
}

/* プレイヤーAPIから現在再生中タイトルを取得してUIに反映 */
function updateCurrentVideoTitle(){
  if(!player||typeof player.getVideoData!=='function')return;
  const d=player.getVideoData();
  if(!d||!d.title)return;

  /* now-playingバーを更新 */
  document.getElementById('nowPlayingTitle').textContent=d.title;

  /* リストの表示名も更新（種類問わず「お気に入り」で始まる名前はすべて書き換える） */
  if(currentPlaying!==null&&customPlaylists[currentPlaying]){
    const entry=customPlaylists[currentPlaying];
    if(entry.name.startsWith('お気に入り')){
      entry.name=d.title;
      localStorage.setItem('study_space_custom_playlists',JSON.stringify(customPlaylists));
      const el=document.getElementById(`playlist-name-${currentPlaying}`);
      if(el)el.textContent=d.title;
    }
  }
}
function startTitleMonitor(){
  clearInterval(titleCheckInterval);
  /* 最初は即時取得、その後1.5秒ごとに監視 */
  updateCurrentVideoTitle();
  titleCheckInterval=setInterval(updateCurrentVideoTitle,1500);
}

/* URL追加時にoEmbedでタイトルを非同期取得 */
async function resolveTitle(idx){
  const e=customPlaylists[idx];
  if(!e||!e.name.startsWith('お気に入り'))return;
  const m=parseYouTubeUrl(e.url);
  if(!m)return;

  /* 動画も再生リストも同じoEmbed URLで取得 */
  const targetUrl=m.type==='playlist'
    ?`https://www.youtube.com/playlist?list=${m.id}`
    :`https://www.youtube.com/watch?v=${m.id}`;

  const title=await fetchTitleByUrl(targetUrl);
  if(title&&customPlaylists[idx]){
    customPlaylists[idx].name=title;
    localStorage.setItem('study_space_custom_playlists',JSON.stringify(customPlaylists));
    const el=document.getElementById(`playlist-name-${idx}`);
    if(el)el.textContent=title;
  }
}

function addCustom(){
  const v=document.getElementById('urlInput').value.trim();
  if(!v)return;
  if(!v.includes('youtube.com')&&!v.includes('youtu.be')){alert('YouTubeのURLを入力してください');return}
  const m=parseYouTubeUrl(v);
  if(!m){alert('有効なIDが見つかりません');return}
  const isLive=v.includes('/live/');
  const label=m.type==='playlist'?'プレイリスト':(isLive?'ライブ':'動画');
  customPlaylists.push({url:v,name:`お気に入り${label} `+(customPlaylists.length+1)});
  localStorage.setItem('study_space_custom_playlists',JSON.stringify(customPlaylists));
  document.getElementById('urlInput').value='';
  renderCustom();
  resolveTitle(customPlaylists.length-1);
}

function deleteCustom(idx){
  if(currentPlaying===idx){
    if(player){player.destroy();clearInterval(titleCheckInterval);}
    document.getElementById('ytPlayerContainer').style.display='none';
    document.getElementById('ytPlaceholder').style.display='flex';
    document.getElementById('nowPlayingTitle').textContent='動画が再生されていません';
    currentPlaying=null;
  }else if(currentPlaying>idx)currentPlaying--;
  customPlaylists.splice(idx,1);
  localStorage.setItem('study_space_custom_playlists',JSON.stringify(customPlaylists));
  renderCustom();
}

function syncYouTube(a){
  if(!player||typeof player.playVideo!=='function')return;
  try{if(a==='play')player.playVideo();else if(a==='pause')player.pauseVideo();}catch(e){}
}

/* PiP */
function ensurePiPAllowed(){
  const f=document.querySelector('#ytPlayer iframe');if(!f)return false;
  const a=f.getAttribute('allow')||'';
  if(!a.includes('picture-in-picture'))f.setAttribute('allow',a+(a?'; ':'')+'picture-in-picture');
  return true;
}
function togglePiP(){
  const ok=ensurePiPAllowed();
  const btn=document.getElementById('pipBtn');
  if(!ok){alert('先に動画を選択して再生してください');return}
  btn.classList.toggle('active');
  btn.title=btn.classList.contains('active')?'PiP許可済み（動画右下メニューまたはiPadスワイプで起動）':'ピクチャ・イン・ピクチャ';
}
document.addEventListener('enterpictureinpicture',()=>{const b=document.getElementById('pipBtn');if(b)b.classList.add('active');});
document.addEventListener('leavepictureinpicture',()=>{const b=document.getElementById('pipBtn');if(b)b.classList.remove('active');});

/* Media Session */
function setupMediaSession(title){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({title:title||'Study Timer',artist:'Study Space',album:'タイマー実行中'});
  navigator.mediaSession.setActionHandler('play',()=>{if(mode==='pomodoro'&&!pomoRunning)togglePomo();else if(mode==='free'&&!freeRunning)toggleFree();});
  navigator.mediaSession.setActionHandler('pause',()=>{if(mode==='pomodoro'&&pomoRunning)togglePomo();else if(mode==='free'&&freeRunning)toggleFree();});
  navigator.mediaSession.setActionHandler('stop',()=>{if(mode==='pomodoro')resetPomo();else resetFree();});
}
function setMediaSessionState(p){if(!('mediaSession' in navigator))return;navigator.mediaSession.playbackState=p?'playing':'paused';}

/* ===== Timer ===== */
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function fmtTotal(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}<span>h</span> ${String(m).padStart(2,'0')}<span>m</span> ${String(ss).padStart(2,'0')}<span>s</span>`}
function startTotal(){if(!totalInterval)totalInterval=setInterval(()=>{totalStudySec++;document.getElementById('totalDisplay').innerHTML=fmtTotal(totalStudySec);},1000);}
function stopTotal(){if(!freeRunning&&!pomoRunning){clearInterval(totalInterval);totalInterval=null;}}

function setMode(m){
  mode=m;
  document.getElementById('tabPomo').classList.toggle('active',m==='pomodoro');
  document.getElementById('tabFree').classList.toggle('active',m==='free');
  document.getElementById('freeMode').style.display=m==='free'?'flex':'none';
  document.getElementById('pomoMode').style.display=m==='pomodoro'?'flex':'none';
  document.getElementById('pomoSettingsLeft').style.opacity=m==='pomodoro'?'1':'0.4';
}

/* Free */
function toggleFree(){
  if(!freeRunning){
    freeRunning=true;
    document.getElementById('freeIcon').className='ti ti-player-pause';
    document.getElementById('freeStatusDot').className='status-dot running';
    document.getElementById('freeModeLabel').textContent='計測中';
    freeInterval=setInterval(()=>{freeSec++;updateFreeUI();},1000);
    startTotal();syncYouTube('play');
    setupMediaSession(document.getElementById('nowPlayingTitle').textContent);setMediaSessionState(true);
  }else{
    freeRunning=false;clearInterval(freeInterval);
    document.getElementById('freeIcon').className='ti ti-player-play';
    document.getElementById('freeStatusDot').className='status-dot paused';
    document.getElementById('freeModeLabel').textContent='一時停止';
    stopTotal();syncYouTube('pause');setMediaSessionState(false);
  }
}
function updateFreeUI(){
  document.getElementById('freeDisplay').textContent=fmt(freeSec);
  document.getElementById('freeRing').style.strokeDashoffset=502*((freeSec%3600)/3600);
}
function resetFree(){
  if(freeRunning)toggleFree();if(freeSec>0)addLog('フリー学習',freeSec);freeSec=0;
  document.getElementById('freeDisplay').textContent='00:00';
  document.getElementById('freeStatusDot').className='status-dot';
  document.getElementById('freeModeLabel').textContent='待機中';
  document.getElementById('freeIcon').className='ti ti-player-play';
  document.getElementById('freeRing').style.strokeDashoffset='0';
  syncYouTube('pause');
}
function lapFree(){if(!freeRunning||freeSec===0)return;addLog('ラップ',freeSec);}

/* Pomodoro */
function updatePomoSettings(){
  workSec=parseInt(document.getElementById('workMin').value)*60;
  shortSec=parseInt(document.getElementById('shortMin').value)*60;
  longSec=parseInt(document.getElementById('longMin').value)*60;
  if(!pomoRunning){pomoSec=pomoPhase==='work'?workSec:pomoPhase==='short'?shortSec:longSec;updatePomoUI();}
  renderDots();
}
function adjustSetCount(v){totalSets=Math.max(2,Math.min(8,totalSets+v));document.getElementById('setCountVal').textContent=totalSets;renderDots();}
function renderDots(){
  document.getElementById('pomoDots').innerHTML=Array.from({length:totalSets},(_,i)=>
    `<div class="dot ${i<pomoSet?'done':i===pomoSet&&pomoPhase==='work'?'current':''}"></div>`).join('');
}
function togglePomo(){
  if(!pomoRunning){
    pomoRunning=true;if(pomoSec===0)pomoSec=workSec;
    document.getElementById('pomoIcon').className='ti ti-player-pause';
    document.getElementById('pomoStatusDot').className='status-dot running';
    pomoInterval=setInterval(pomoTick,1000);
    if(pomoPhase==='work'){startTotal();syncYouTube('play');}else syncYouTube('pause');
    setupMediaSession(document.getElementById('nowPlayingTitle').textContent);setMediaSessionState(pomoPhase==='work');
  }else{
    pomoRunning=false;clearInterval(pomoInterval);
    document.getElementById('pomoIcon').className='ti ti-player-play';
    document.getElementById('pomoStatusDot').className='status-dot paused';
    stopTotal();syncYouTube('pause');setMediaSessionState(false);
  }
}
function pomoTick(){pomoSec--;if(pomoSec<=0){nextPomoPhase();return}updatePomoUI();}
function nextPomoPhase(){
  clearInterval(pomoInterval);pomoRunning=false;syncYouTube('pause');
  if(pomoPhase==='work'){
    addLog('ポモドーロ #'+(pomoSet+1),workSec);pomoSet++;stopTotal();
    if(pomoSet>=totalSets){pomoPhase='long';pomoSec=longSec;}else{pomoPhase='short';pomoSec=shortSec;}
  }else{if(pomoPhase==='long')pomoSet=0;pomoPhase='work';pomoSec=workSec;}
  renderDots();updatePomoUI();
  document.getElementById('pomoIcon').className='ti ti-player-play';
  document.getElementById('pomoStatusDot').className='status-dot';
}
function resetPomo(){
  if(pomoRunning)togglePomo();pomoSet=0;pomoPhase='work';pomoSec=workSec;
  renderDots();updatePomoUI();
  document.getElementById('pomoStatusDot').className='status-dot';
  document.getElementById('pomoIcon').className='ti ti-player-play';
  syncYouTube('pause');
}
function skipPomo(){if(pomoRunning)togglePomo();nextPomoPhase();}
function updatePomoUI(){
  const total=pomoPhase==='work'?workSec:pomoPhase==='short'?shortSec:longSec;
  document.getElementById('pomoDisplay').textContent=fmt(pomoSec);
  document.getElementById('pomoRing').style.strokeDashoffset=502*(1-(pomoSec/total));
  document.getElementById('pomoRing').style.stroke=pomoPhase==='work'?'var(--accent)':pomoPhase==='short'?'var(--accent2)':'var(--warn)';
  document.getElementById('pomoPhaseLabel').textContent={work:'作業セッション',short:'短休憩',long:'長休憩'}[pomoPhase];
  document.getElementById('pomoRingLabel').textContent={work:'集中モード',short:'休憩中',long:'長期休憩'}[pomoPhase];
}

/* Log */
function addLog(label,sec){
  const now=new Date();const t=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  logs.unshift({label,sec,t});
  document.getElementById('logList').innerHTML=logs.slice(0,8).map(l=>
    `<div class="log-item"><span>${l.label}</span><span class="log-time">${l.t} | ${fmt(l.sec)}</span></div>`).join('');
}

/* Init */
initDialOptions();
updatePomoSettings();
renderCustom();
renderTasks();
pomoSec=workSec;updatePomoUI();
setMode('pomodoro');
customPlaylists.forEach((_,i)=>resolveTitle(i));
</script>
