<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Study Space - Premium Timer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a32;
      --accent:#7c6aff;--accent2:#4ecdc4;--text:#e8e8f0;--muted:#6b6b7e;
      --danger:#ff6b6b;--success:#4ecdc4;--warn:#ffd166;
    }
    body{
      background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
      height:100vh;overflow:hidden;padding:0;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* iPadの1画面に収めるためのグリッド構成 */
    .app{
      display:grid;
      grid-template-columns:1fr 1fr;
      height:100vh;
      max-height:100vh;
      overflow:hidden;
    }
    
    @media (max-width: 950px) {
      .app { grid-template-columns: 1fr; overflow-y: auto; height: auto; max-height: none; }
      body { overflow: auto; height: auto; }
      .left { border-right: none !important; border-bottom: 1px solid var(--border); }
    }

    .left{
      padding:1.5rem;
      border-right:1px solid var(--border);
      display:flex;
      flex-direction:column;
      gap:1rem;
      overflow:hidden;
    }
    .right{
      padding:1.5rem;
      background:var(--surface);
      display:flex;
      flex-direction:column;
      gap:1rem;
      overflow:hidden;
    }

    /* Total time */
    .total-block{margin-bottom:0}
    .total-label{font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.2rem}
    .total-time{font-family:'DM Mono',monospace;font-size:2.8rem;font-weight:400;color:var(--text);line-height:1;letter-spacing:-.02em}
    .total-time span{color:var(--muted);font-size:1.6rem}

    /* Mode tabs */
    .mode-tabs{display:flex;gap:8px}
    .tab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
    .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

    /* Timer card - 横並びスタイル */
    .timer-card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:14px;
      padding:1.2rem;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:2rem;
      position:relative;
    }
    .timer-info-pane{
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .timer-phase{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem}

    /* Progress ring */
    .ring-wrap{position:relative;width:150px;height:150px}
    .ring-wrap svg{transform:rotate(-90deg);width:150px;height:150px}
    .ring-bg{fill:none;stroke:var(--border);stroke-width:5}
    .ring-fg{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .5s ease,stroke .3s}
    .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:85%}
    .ring-mins{font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:400;line-height:1}
    .ring-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

    /* Controls */
    .controls{display:flex;flex-direction:column;align-items:center;gap:10px}
    .btn-main{width:48px;height:48px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .2s}
    .btn-main:hover{opacity:.85}
    .btn-main:active{transform:scale(.93)}
    .btn-sec{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .btn-sec:hover{border-color:var(--text);color:var(--text)}

    /* Pomodoro count */
    .pomo-dots{display:flex;gap:5px;margin-top:0.5rem}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .3s}
    .dot.done{background:var(--accent)}
    .dot.current{background:var(--warn)}

    /* Right panel Titles */
    .section-title{font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding-bottom:.3rem;border-bottom:1px solid var(--border);margin-bottom:0.25rem}

    /* Generic Content Box */
    .content-box{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:0.8rem;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    /* Playlist UI */
    .playlist-list{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto}
    .playlist-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .2s;position:relative}
    .playlist-item:hover{border-color:var(--accent);background:rgba(124,106,255,.08)}
    .playlist-item.playing{border-color:var(--accent2);background:rgba(78,205,196,.08)}
    .playlist-name{font-size:12px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .playlist-badge{font-size:9px;padding:1px 5px;border-radius:8px;background:rgba(78,205,196,.15);color:var(--accent2);border:1px solid rgba(78,205,196,.3);flex-shrink:0}

    /* Generic Input styling */
    .input-row{display:flex;gap:6px;margin-top:0.5rem}
    .input-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none}
    .input-row input:focus{border-color:var(--accent)}
    .input-row button{padding:6px 12px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;white-space:nowrap}
    .input-row button:disabled{opacity:0.5;cursor:not-allowed}

    .btn-delete{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .btn-delete:hover{color:var(--danger);background:rgba(255,107,107,0.1)}

    /* YouTube embed */
    .yt-wrap{border-radius:10px;overflow:hidden;aspect-ratio:16/9;background:var(--surface2);border:1px solid var(--border)}
    .yt-wrap iframe{width:100%;height:100%;border:none}
    .yt-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;color:var(--muted);font-size:12px}

    .now-playing-box{background:rgba(124,106,255,0.06);border:1px dashed var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text)}
    .now-playing-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

    /* 📝 Task List UI */
    .task-container{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .task-list{display:flex;flex-direction:column;gap:6px;overflow-y:auto;flex:1;padding-right:2px}
    .task-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2)}
    .task-checkbox{background:transparent;border:1px solid var(--muted);color:transparent;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .2s;flex-shrink:0}
    .task-item.completed .task-checkbox{background:var(--success);border-color:var(--success);color:#fff}
    .task-text{font-size:12px;flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .task-item.completed .task-text{color:var(--muted);text-decoration:line-through}

    /* 🎛️ ダイヤル式設定UIのスタイル */
    .pomo-settings-dial-wrap {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: stretch;
    }
    .dial-picker-box {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .dial-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dial-select {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      text-align-last: center;
      outline: none;
      cursor: pointer;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      padding: 4px 0;
    }
    .dial-picker-box::after {
      content: '▾';
      font-size: 9px;
      color: var(--muted);
      position: absolute;
      bottom: 2px;
      pointer-events: none;
    }

    /* コンパクトカウンター */
    .counter-box {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.02);
      border-radius: 4px;
      padding: 2px;
      width: 100%;
      justify-content: space-between;
    }
    .counter-btn {
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .counter-btn:active { background: var(--border); }
    .counter-value {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
    }

    /* Log list */
    .log-list{display:flex;flex-direction:column;gap:4px;max-height:85px;overflow-y:auto}
    .log-item{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);padding:2px 0;border-bottom:1px solid var(--border)}
    .log-item:last-child{border-bottom:none}
    .log-time{font-family:'DM Mono',monospace;color:var(--accent)}

    .status-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:0.4rem}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .status-dot.running{background:var(--success);box-shadow:0 0 0 2px rgba(78,205,196,.2)}
    .status-dot.paused{background:var(--warn)}
  </style>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">勉強タイマーアプリ</h2>

<div class="app">
  <div class="left">
    <div class="total-block">
      <div class="total-label">今日の学習時間</div>
      <div class="total-time" id="totalDisplay">00<span>h</span> 00<span>m</span> 00<span>s</span></div>
    </div>

    <div class="mode-tabs">
      <button class="tab active" id="tabPomo" onclick="setMode('pomodoro')">ポモドーロ</button>
      <button class="tab" id="tabFree" onclick="setMode('free')">フリー</button>
    </div>

    <div id="pomoMode" class="timer-card">
      <div class="timer-info-pane">
        <div class="timer-phase" id="pomoPhaseLabel">作業セッション</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 180 180">
            <circle class="ring-bg" cx="90" cy="90" r="80"/>
            <circle class="ring-fg" id="pomoRing" cx="90" cy="90" r="80" stroke-dasharray="502" stroke-dashoffset="0"/>
          </svg>
          <div class="ring-center">
            <div class="ring-mins" id="pomoDisplay">25:00</div>
            <div class="ring-label" id="pomoRingLabel">準備完了</div>
          </div>
        </div>
        <div class="pomo-dots" id="pomoDots"></div>
      </div>
      
      <div class="controls">
        <button class="btn-main" id="pomoBtn" onclick="togglePomo()"><i class="ti ti-player-play" aria-hidden="true" id="pomoIcon"></i></button>
        <button class="btn-sec" onclick="skipPomo()" title="スキップ"><i class="ti ti-player-skip-forward" aria-hidden="true"></i></button>
        <button class="btn-sec" onclick="resetPomo()" title="リセット"><i class="ti ti-refresh" aria-hidden="true"></i></button>
        <div class="status-bar">
          <div class="status-dot" id="pomoStatusDot"></div>
        </div>
      </div>
    </div>

    <div id="freeMode" class="timer-card" style="display:none">
      <div class="timer-info-pane">
        <div class="timer-phase">集中タイマー</div>
        <div class="ring-wrap">
          <svg viewBox="0 0 180 180">
            <circle class="ring-bg" cx="90" cy="90" r="80"/>
            <circle class="ring-fg" id="freeRing" cx="90" cy="90" r="80" stroke-dasharray="502" stroke-dashoffset="0"/>
          </svg>
          <div class="ring-center">
            <div class="ring-mins" id="freeDisplay">00:00</div>
            <div class="ring-label" id="freeModeLabel">待機中</div>
          </div>
        </div>
      </div>
      
      <div class="controls">
        <button class="btn-main" id="freeBtn" onclick="toggleFree()"><i class="ti ti-player-play" aria-hidden="true" id="freeIcon"></i></button>
        <button class="btn-sec" onclick="lapFree()" title="ラップ"><i class="ti ti-flag" aria-hidden="true"></i></button>
        <button class="btn-sec" onclick="resetFree()" title="リセット"><i class="ti ti-refresh" aria-hidden="true"></i></button>
        <div class="status-bar">
          <div class="status-dot" id="freeStatusDot"></div>
        </div>
      </div>
    </div>

    <div id="pomoSettingsLeft" class="content-box">
      <div class="section-title" style="border:none;margin-bottom:.3rem">ポモドーロタイマー設定</div>
      <div class="pomo-settings-dial-wrap">
        <div class="dial-picker-box">
          <span class="dial-label">作業</span>
          <select id="workMin" class="dial-select" onchange="updatePomoSettings()"></select>
        </div>
        <div class="dial-picker-box">
          <span class="dial-label">短休憩</span>
          <select id="shortMin" class="dial-select" onchange="updatePomoSettings()"></select>
        </div>
        <div class="dial-picker-box">
          <span class="dial-label">長休憩</span>
          <select id="longMin" class="dial-select" onchange="updatePomoSettings()"></select>
        </div>
        <div class="dial-picker-box" style="flex: 1.2;">
          <span class="dial-label">セット数</span>
          <div class="counter-box">
            <button class="counter-btn" onclick="adjustSetCount(-1)">−</button>
            <span class="counter-value" id="setCountVal">4</span>
            <button class="counter-btn" onclick="adjustSetCount(1)">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="content-box task-container">
      <div class="section-title">タスク / やることリスト</div>
      <div class="task-list" id="taskList">
        <div style="font-size:12px;color:var(--muted)">タスクがありません</div>
      </div>
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="新しいタスクを入力..." onkeypress="if(event.key==='Enter')addTask()" />
        <button onclick="addTask()">追加</button>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="section-title">BGM / 作業音楽</div>

    <div class="yt-wrap" id="ytWrap">
      <div class="yt-placeholder" id="ytPlaceholder">
        <i class="ti ti-music" style="font-size:28px;color:var(--border)" aria-hidden="true"></i>
        <span>URLを追加して選択してください</span>
      </div>
      <div id="ytPlayerContainer" style="display:none;width:100%;height:100%">
        <div id="ytPlayer"></div>
      </div>
    </div>

    <div class="now-playing-box">
      <i class="ti ti-disc" style="color:var(--accent)" aria-hidden="true"></i>
      <span class="now-playing-title" id="nowPlayingTitle">動画が再生されていません</span>
    </div>

    <div class="content-box" style="flex:1;overflow:hidden">
      <div class="section-title" style="border:none">カスタムお気に入り</div>
      <div class="playlist-list" id="customList">
        <div style="font-size:11px;color:var(--muted)">URLを追加してください</div>
      </div>
      <div class="input-row">
        <input type="text" id="urlInput" placeholder="YouTube 動画 / 再生リストのURL" />
        <button onclick="addCustom()" id="addBtn">追加</button>
      </div>
    </div>

    <div class="content-box" style="flex:1">
      <div class="section-title" style="border:none">セッション記録</div>
      <div class="log-list" id="logList">
        <div style="font-size:11px;color:var(--muted);">まだ記録がありません</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentPlaying=null;
let customPlaylists= JSON.parse(localStorage.getItem('study_space_custom_playlists')) || [];
let tasks = JSON.parse(localStorage.getItem('study_space_tasks')) || [];

let player=null;
let titleCheckInterval=null;

function initDialOptions() {
  const workSelect = document.getElementById('workMin');
  const shortSelect = document.getElementById('shortMin');
  const longSelect = document.getElementById('longMin');

  workSelect.innerHTML = '';
  shortSelect.innerHTML = '';
  longSelect.innerHTML = '';

  for(let i=5; i<=60; i+=5) {
    workSelect.options.add(new Option(i + '分', i));
    longSelect.options.add(new Option(i + '分', i));
  }
  for(let i=5; i<=30; i+=5) {
    shortSelect.options.add(new Option(i + '分', i));
  }

  workSelect.value = 25;
  shortSelect.value = 5;
  longSelect.value = 15;
}

/* 📝 TASK LIST FUNCTIONS */
function renderTasks() {
  const el = document.getElementById('taskList');
  if (!tasks.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted)">タスクがありません</div>';
    return;
  }
  el.innerHTML = tasks.map((t, i) => `
    <div class="task-item ${t.completed ? 'completed' : ''}">
      <div class="task-checkbox" onclick="toggleTask(${i})">
        <i class="ti ti-check" aria-hidden="true"></i>
      </div>
      <div class="task-text" onclick="toggleTask(${i})">${t.text}</div>
      <button class="btn-delete" onclick="deleteTask(${i})" title="削除">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>`).join('');
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  tasks.push({ text: text, completed: false });
  localStorage.setItem('study_space_tasks', JSON.stringify(tasks));
  input.value = '';
  renderTasks();
}

function toggleTask(idx) {
  tasks[idx].completed = !tasks[idx].completed;
  localStorage.setItem('study_space_tasks', JSON.stringify(tasks));
  renderTasks();
}

function deleteTask(idx) {
  tasks.splice(idx, 1);
  localStorage.setItem('study_space_tasks', JSON.stringify(tasks));
  renderTasks();
}

/* 🎵 PLAYLIST / VIDEO FUNCTIONS */
function renderCustom(){
  const el=document.getElementById('customList');
  if(!customPlaylists.length){el.innerHTML='<div style="font-size:11px;color:var(--muted)">URLを追加してください</div>';return}
  el.innerHTML=customPlaylists.map((p,i)=>`
    <div class="playlist-item ${currentPlaying===i?'playing':''}" onclick="event.target.closest('.btn-delete') ? null : playPlaylist(${i})">
      <div class="playlist-name" id="playlist-name-${i}">${p.name||'カスタムリンク'}</div>
      ${currentPlaying===i?'<span class="playlist-badge" style="margin-right:4px">選択中</span>':''}
      <button class="btn-delete" onclick="deleteCustom(${i}); event.stopPropagation();" title="削除">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>`).join('');
}

function parseYouTubeUrl(url) {
  const listMatch = url.match(/[?&]list=([^&]+)/);
  if (listMatch) return { type: 'playlist', id: listMatch[1] };
  
  const videoMatch = url.match(/[?&]v=([^&]+)/);
  if (videoMatch) return { type: 'video', id: videoMatch[1] };
  
  const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
  if (shortMatch) return { type: 'video', id: shortMatch[1] };
  
  return null;
}

function playPlaylist(idx){
  const media = parseYouTubeUrl(customPlaylists[idx].url);
  if(!media){alert('有効なYouTubeのURLを入力してください');return}
  
  currentPlaying=idx;
  document.getElementById('nowPlayingTitle').textContent = "読み込み中...";

  const container=document.getElementById('ytPlayerContainer');
  const ph=document.getElementById('ytPlaceholder');
  container.style.display='block';
  ph.style.display='none';

  clearInterval(titleCheckInterval);
  if(player) { try { player.destroy(); } catch(e){} player = null; }
  container.innerHTML = '<div id="ytPlayer"></div>';

  let playerVars = {
    autoplay: 1,
    playsinline: 1,
  };

  // 🔴 再生リスト専用の読み込み設定（仕様に合わせて最適化）
  if (media.type === 'playlist') {
    playerVars.listType = 'playlist';
    playerVars.list = media.id;
  }

  player = new YT.Player('ytPlayer', {
    width: '100%',
    height: '100%',
    videoId: media.type === 'video' ? media.id : undefined,
    playerVars: playerVars,
    events: {
      'onReady': (event) => {
        // 再生リストの場合は明示的にリスト読み込みをキックする
        if(media.type === 'playlist') {
          event.target.loadPlaylist({list: media.id, listType: 'playlist'});
        } else {
          event.target.playVideo();
        }
        startTitleMonitor();
      },
      'onStateChange': (event) => {
        updateCurrentVideoTitle();
      }
    }
  });

  renderCustom();
}

function updateCurrentVideoTitle() {
  if (player && typeof player.getVideoData === 'function') {
    const videoData = player.getVideoData();
    if (videoData && videoData.title) {
      const realTitle = videoData.title;
      document.getElementById('nowPlayingTitle').textContent = realTitle;
      
      if (currentPlaying !== null && customPlaylists[currentPlaying]) {
        // 初期名（お気に入り〜）の時だけ本物のタイトルに差し替えてLocalStorageに同期
        if (customPlaylists[currentPlaying].name.startsWith("お気に入り")) {
          customPlaylists[currentPlaying].name = realTitle;
          localStorage.setItem('study_space_custom_playlists', JSON.stringify(customPlaylists));
          const nameEl = document.getElementById(`playlist-name-${currentPlaying}`);
          if (nameEl) nameEl.textContent = realTitle;
        }
      }
    }
  }
}

function startTitleMonitor() {
  clearInterval(titleCheckInterval);
  titleCheckInterval = setInterval(updateCurrentVideoTitle, 1500);
}

function addCustom(){
  const v=document.getElementById('urlInput').value.trim();
  if(!v)return;
  if(!v.includes('youtube.com')&&!v.includes('youtu.be')){alert('YouTubeの動画または再生リストのURLを入力してください');return}
  
  const media = parseYouTubeUrl(v);
  if(!media) { alert('有効な動画IDまたは再生リストIDが見つかりません'); return; }

  const typeLabel = media.type === 'playlist' ? 'リスト' : '動画';
  const labelName = `お気に入り${typeLabel} ` + (customPlaylists.length + 1);

  customPlaylists.push({url: v, name: labelName});
  localStorage.setItem('study_space_custom_playlists', JSON.stringify(customPlaylists));
  
  document.getElementById('urlInput').value='';
  renderCustom();
}

function deleteCustom(idx) {
  if(currentPlaying === idx) {
    if(player) { player.destroy(); clearInterval(titleCheckInterval); }
    document.getElementById('ytPlayerContainer').style.display='none';
    document.getElementById('ytPlaceholder').style.display='flex';
    document.getElementById('nowPlayingTitle').textContent = "動画が再生されていません";
    currentPlaying = null;
  } else if (currentPlaying > idx) {
    currentPlaying--;
  }
  customPlaylists.splice(idx, 1);
  localStorage.setItem('study_space_custom_playlists', JSON.stringify(customPlaylists));
  renderCustom();
}

function syncYouTube(action) {
  if (!player || typeof player.playVideo !== 'function') return;
  try {
    if (action === 'play') { player.playVideo(); } 
    else if (action === 'pause') { player.pauseVideo(); }
  } catch(e) { console.log(e); }
}

/* Timer state */
let mode='pomodoro';
let freeRunning=false,freeSec=0,freeInterval=null;
let pomoRunning=false;
let pomoSec=0,pomoInterval=null;
let pomoPhase='work'; 
let pomoSet=0;
let workSec=25*60,shortSec=5*60,longSec=15*60,totalSets=4;
let totalStudySec=0,totalInterval=null;
let logs=[];

function setMode(m){
  mode=m;
  document.getElementById('tabPomo').classList.toggle('active', m==='pomodoro');
  document.getElementById('tabFree').classList.toggle('active', m==='free');
  
  document.getElementById('freeMode').style.display=m==='free'?'flex':'none';
  document.getElementById('pomoMode').style.display=m==='pomodoro'?'flex':'none';
  
  document.getElementById('pomoSettingsLeft').style.opacity = m==='pomodoro'?'1':'0.4';
}

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function fmtTotal(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return`${String(h).padStart(2,'0')}<span>h</span> ${String(m).padStart(2,'0')}<span>m</span> ${String(ss).padStart(2,'0')}<span>s</span>`}

function startTotal(){if(!totalInterval)totalInterval=setInterval(()=>{totalStudySec++;document.getElementById('totalDisplay').innerHTML=fmtTotal(totalStudySec)},1000)}
function stopTotal(){if(!freeRunning&&!pomoRunning){clearInterval(totalInterval);totalInterval=null}}

/* FREE MODE */
function toggleFree(){
  if(!freeRunning){
    freeRunning=true;
    document.getElementById('freeIcon').className='ti ti-player-pause';
    document.getElementById('freeStatusDot').className='status-dot running';
    document.getElementById('freeModeLabel').textContent='計測中';
    freeInterval=setInterval(()=>{freeSec++;updateFreeUI()},1000);
    startTotal();
    syncYouTube('play');
  } else {
    freeRunning=false;
    clearInterval(freeInterval);
    document.getElementById('freeIcon').className='ti ti-player-play';
    document.getElementById('freeStatusDot').className='status-dot paused';
    document.getElementById('freeModeLabel').textContent='一時停止';
    stopTotal();
    syncYouTube('pause');
  }
}
function updateFreeUI(){
  document.getElementById('freeDisplay').textContent=fmt(freeSec);
  const pct = (freeSec % 3600) / 3600;
  document.getElementById('freeRing').style.strokeDashoffset = 502 * pct;
}
function resetFree(){
  if(freeRunning)toggleFree();
  if(freeSec>0){addLog('フリー学習',freeSec)}
  freeSec=0;
  document.getElementById('freeDisplay').textContent='00:00';
  document.getElementById('freeStatusDot').className='status-dot';
  document.getElementById('freeModeLabel').textContent='待機中';
  document.getElementById('freeIcon').className='ti ti-player-play';
  document.getElementById('freeRing').style.strokeDashoffset='0';
  syncYouTube('pause');
}
function lapFree(){if(!freeRunning||freeSec===0)return;addLog('ラップ',freeSec)}

/* POMODORO */
function updatePomoSettings(){
  workSec=parseInt(document.getElementById('workMin').value)*60;
  shortSec=parseInt(document.getElementById('shortMin').value)*60;
  longSec=parseInt(document.getElementById('longMin').value)*60;
  
  if(!pomoRunning){
    pomoSec = (pomoPhase==='work') ? workSec : (pomoPhase==='short' ? shortSec : longSec);
    updatePomoUI();
  }
  renderDots();
}

function adjustSetCount(val) {
  let current = totalSets;
  current += val;
  if(current < 2) current = 2;
  if(current > 8) current = 8;
  totalSets = current;
  document.getElementById('setCountVal').textContent = totalSets;
  renderDots();
}

function renderDots(){
  const d=document.getElementById('pomoDots');
  d.innerHTML=Array.from({length:totalSets},(_,i)=>`<div class="dot ${i<pomoSet?'done':i===pomoSet&&pomoPhase==='work'?'current':''}" id="dot${i}"></div>`).join('');
}
function togglePomo(){
  if(!pomoRunning){
    pomoRunning=true;
    if(pomoSec===0)pomoSec=workSec;
    document.getElementById('pomoIcon').className='ti ti-player-pause';
    document.getElementById('pomoStatusDot').className='status-dot running';
    pomoInterval=setInterval(pomoTick,1000);
    
    if(pomoPhase==='work') {
      startTotal();
      syncYouTube('play');
    } else {
      syncYouTube('pause');
    }
  } else {
    pomoRunning=false;clearInterval(pomoInterval);
    document.getElementById('pomoIcon').className='ti ti-player-play';
    document.getElementById('pomoStatusDot').className='status-dot paused';
    stopTotal();
    syncYouTube('pause');
  }
}
function pomoTick(){
  pomoSec--;
  if(pomoSec<=0){nextPomoPhase();return}
  updatePomoUI();
}
function nextPomoPhase(){
  clearInterval(pomoInterval);pomoRunning=false;
  syncYouTube('pause');
  
  if(pomoPhase==='work'){
    addLog('ポモドーロ #'+(pomoSet+1),workSec);
    pomoSet++;
    stopTotal();
    if(pomoSet>=totalSets){pomoPhase='long';pomoSec=longSec;}
    else{pomoPhase='short';pomoSec=shortSec;}
  } else {
    if(pomoPhase==='long'){pomoSet=0;}
    pomoPhase='work';pomoSec=workSec;
  }
  renderDots();updatePomoUI();
  document.getElementById('pomoIcon').className='ti ti-player-play';
  document.getElementById('pomoStatusDot').className='status-dot';
}
function resetPomo(){
  if(pomoRunning)togglePomo();
  pomoSet=0;pomoPhase='work';pomoSec=workSec;
  renderDots();updatePomoUI();
  document.getElementById('pomoStatusDot').className='status-dot';
  document.getElementById('pomoIcon').className='ti ti-player-play';
  syncYouTube('pause');
}
function skipPomo(){if(pomoRunning)togglePomo();nextPomoPhase();}
function updatePomoUI(){
  const total=pomoPhase==='work'?workSec:pomoPhase==='short'?shortSec:longSec;
  const pct=1-(pomoSec/total);
  document.getElementById('pomoDisplay').textContent=fmt(pomoSec);
  document.getElementById('pomoRing').style.strokeDashoffset=502*pct;
  document.getElementById('pomoRing').style.stroke=pomoPhase==='work'?'var(--accent)':pomoPhase==='short'?'var(--accent2)':'var(--warn)';
  const labels={work:'作業セッション',short:'短休憩',long:'長休憩'};
  const rlabels={work:'集中モード',short:'休憩中',long:'長期休憩'};
  document.getElementById('pomoPhaseLabel').textContent=labels[pomoPhase];
  document.getElementById('pomoRingLabel').textContent=rlabels[pomoPhase];
}

function addLog(label,sec){
  const now=new Date();const t=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  logs.unshift({label,sec,t});
  const el=document.getElementById('logList');
  el.innerHTML=logs.slice(0,6).map(l=>`
    <div class="log-item">
      <span>${l.label}</span>
      <span class="log-time">${l.t} | ${fmt(l.sec)}</span>
    </div>`).join('');
}

// Init
initDialOptions();
updatePomoSettings();
renderCustom();
renderTasks();
pomoSec=workSec;updatePomoUI();
setMode('pomodoro');
</script>
